<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="status-bar">
        <div class="connection-indicator">
            <div class="indicator-dot"></div>
            <span class="indicator-text">Connected</span>
        </div>
        <div class="command-indicator">
            <span>Sent Command: </span>
            <span id="last-command">None</span>
        </div>
    </div>
    
    <div class="container">
        <div class="hexagon-container">
            <img src="Hexagon.png" class="hexagon-image" alt="Hexagon">
            <div class="button-container">
                <!-- Top buttons -->
                <div class="button-pair top">
                    <button id="T1">O</button>
                    <button id="T2">O</button>
                </div>
                <!-- Top Right buttons -->
                <div class="button-pair top-right">
                    <button id="TR1">O</button>
                    <button id="TR2">O</button>
                </div>
                <!-- Bottom Right buttons -->
                <div class="button-pair bottom-right">
                    <button id="BR1">O</button>
                    <button id="BR2">O</button>
                </div>
                <!-- Bottom buttons -->
                <div class="button-pair bottom">
                    <button id="B1">O</button>
                    <button id="B2">O</button>
                </div>
                <!-- Bottom Left buttons -->
                <div class="button-pair bottom-left">
                    <button id="BL1">O</button>
                    <button id="BL2">O</button>
                </div>
                <!-- Top Left buttons -->
                <div class="button-pair top-left">
                    <button id="TL1">O</button>
                    <button id="TL2">O</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
